name: Validate shared Dashboard Matrix layouts

on:
  pull_request:
    paths:
      - "layouts/**/*.json"
      - "tools/validate_exports.py"
  push:
    branches: [main]
    paths:
      - "layouts/**/*.json"
      - "tools/validate_exports.py"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tools/validate_exports.py
