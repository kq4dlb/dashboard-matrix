<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard Matrix Admin Login</title><link rel="icon" href="/static/img/dashboard-matrix-mark.svg" type="image/svg+xml"><link rel="stylesheet" href="/static/css/dashboard.css"></head>
<body class="admin-page"><main class="login-layout"><section class="panel login-panel"><div class="admin-brand"><img src="/static/img/dashboard-matrix-mark.svg" alt=""><div><h1>Dashboard Matrix</h1><small>Administration</small></div></div><p class="help">Enter the administrator password to manage dashboards and cards.</p>{% if error %}<p class="login-error">{{ error }}</p>{% endif %}<form method="post" action="/admin/login"><label>Password<input name="password" type="password" required autofocus autocomplete="current-password"></label><button type="submit">Sign in</button></form><p class="help">The initial password is <code>admin</code> unless <code>DASHBOARD_MATRIX_ADMIN_PASSWORD</code> was set before first startup.</p><p><a href="/">Return to Dashboard Matrix</a></p></section></main></body></html>
