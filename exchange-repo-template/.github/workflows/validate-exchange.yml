name: Validate Exchange
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: pip install jsonschema
      - name: Validate layouts and package manifests
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator
          root=Path('.')
          layout_schema=json.loads((root/'schemas/layout.schema.json').read_text())
          package_schema=json.loads((root/'schemas/package.schema.json').read_text())
          for path in (root/'layouts').glob('**/*.json'):
              Draft202012Validator(layout_schema).validate(json.loads(path.read_text()))
          ids=set()
          for group in ('plugins','themes','map-providers'):
              for path in (root/group).glob('*/manifest.json'):
                  data=json.loads(path.read_text())
                  Draft202012Validator(package_schema).validate(data)
                  if data['id'] in ids: raise SystemExit(f"Duplicate package id: {data['id']}")
                  ids.add(data['id'])
          PY
      - run: python scripts/rebuild_index.py
      - name: Commit generated catalog
        if: github.event_name == 'push'
        run: |
          git config user.name dashboard-matrix-bot
          git config user.email dashboard-matrix-bot@users.noreply.github.com
          git add index.json
          git diff --cached --quiet || git commit -m "Rebuild Exchange index"
          git push
